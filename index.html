<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Air Algérie — Assistant Escale</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAB0jZ4FCc6TLvhcnaTwiTH70Y6K2n1eTM",
      authDomain: "assistaient-escal-ah.firebaseapp.com",
      databaseURL: "https://assistaient-escal-ah-default-rtdb.firebaseio.com",
      projectId: "assistaient-escal-ah",
      storageBucket: "assistaient-escal-ah.firebasestorage.app",
      messagingSenderId: "586069947934",
      appId: "1:586069947934:web:aa758f3fe464e0617b200f",
      measurementId: "G-1RTTDRE0ZN"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.__firebaseDB = db;
    window.__firebaseOps = { collection, getDocs, addDoc, updateDoc, deleteDoc, doc, onSnapshot, setDoc };
    window.__firebaseReady = true;
    window.dispatchEvent(new Event("firebaseReady"));
  </script>

  <style>
    :root {
      --bg: #0d0f14;
      --surface: #161921;
      --surface2: #1e2230;
      --border: #2a2f3d;
      --accent: #3d7eff;
      --accent2: #00d4aa;
      --danger: #ff4757;
      --warn: #ffa502;
      --text: #e8eaf0;
      --text2: #8892a4;
      --text3: #4a5568;
      --radius: 10px;
      --font: 'DM Sans', 'Cairo', sans-serif;
      --mono: 'Space Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #0d1b3e 0%, #0d0f14 60%);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .header-brand { display: flex; align-items: center; gap: 10px; }
    .brand-logo {
      width: 32px; height: 32px; background: var(--accent); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: white; font-family: var(--mono);
    }
    .brand-text h1 { font-size: 14px; font-weight: 700; }

    .header-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #888; }
    .status-dot.online { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
    .status-dot.connecting { background: var(--warn); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── LAYOUT ── */
    .layout { display: flex; height: calc(100vh - 60px); position: relative; }
    
    .sidebar { 
      width: 260px; background: var(--surface); border-right: 1px solid var(--border); 
      padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; 
      overflow-y: auto; flex-shrink: 0; transition: transform 0.3s ease; z-index: 400;
    }
    .sidebar-section { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--text3); padding: 8px; }
    
    .nav-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px;
      cursor: pointer; color: var(--text2); font-size: 13px; font-weight: 500; transition: all 0.15s;
    }
    .nav-item.active { background: rgba(61, 126, 255, 0.12); color: var(--accent); border: 1px solid rgba(61, 126, 255, 0.2); }
    .nav-count { margin-left: auto; background: var(--surface2); color: var(--text2); font-size: 10px; padding: 2px 6px; border-radius: 20px; }

    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
    .toolbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .search-wrap { flex: 1; position: relative; min-width: 150px; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); }
    .search-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px 8px 36px; color: var(--text); font-size: 13px; outline: none; }

    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 8px 14px; border: none; border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
    .btn-accent2 { background: rgba(0, 212, 170, 0.12); color: var(--accent2); border: 1px solid rgba(0, 212, 170, 0.25); }
    .btn-sm { padding: 4px 8px; font-size: 11px; border-radius: 6px; }
    .btn-warn { background: rgba(255,165,2,0.12); color: var(--warn); }
    .btn-del { background: rgba(255,71,87,0.12); color: var(--danger); }
    .menu-toggle { display: none; background: var(--surface2); color: var(--text); font-size: 13px; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; }

    .content { flex: 1; overflow-y: auto; padding: 16px; }
    .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .table-title { font-size: 15px; font-weight: 700; }
    .table-meta { font-size: 12px; color: var(--text2); }

    .table-container { width: 100%; overflow-x: auto; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); }
    table { width: 100%; border-collapse: collapse; min-width: 500px; }
    thead th { background: rgba(255,255,255,0.02); color: var(--text2); font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
    
    tbody tr { cursor: pointer; transition: background 0.15s; }
    tbody tr:hover { background: rgba(255, 255, 255, 0.03); }
    td { padding: 12px 14px; vertical-align: middle; border-bottom: 1px solid var(--border); }

    .code-badge { display: inline-flex; align-items: center; gap: 4px; background: rgba(61,126,255,0.1); border: 1px solid rgba(61,126,255,0.2); color: #7eb5ff; font-family: var(--mono); font-size: 12px; padding: 4px 8px; border-radius: 6px; }
    .clickable-title { font-weight: 500; color: var(--text); font-size: 14px; display: block; }
    .clickable-title-ar { font-family: 'Cairo', sans-serif; color: var(--accent2); font-size: 13px; text-align: right; direction: rtl; margin-top: 2px; }

    .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 350; backdrop-filter: blur(2px); }

    /* ── MODALS ── */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: none; align-items: center; justify-content: center; z-index: 500; backdrop-filter: blur(4px); padding: 12px; }
    .overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 520px; padding: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto; }
    .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-head h2 { font-size: 16px; font-weight: 700; }
    .close-btn { width: 28px; height: 28px; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; color: var(--text2); display: flex; align-items: center; justify-content: center; }
    
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text2); margin-bottom: 5px; }
    .form-control { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px; outline: none; }
    textarea.form-control { resize: vertical; min-height: 60px; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

    /* التفاصيل */
    .detail-section { margin-bottom: 16px; padding: 10px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); }
    .detail-label { font-size: 11px; text-transform: uppercase; color: var(--text2); font-weight: 700; margin-bottom: 6px; }
    .detail-val-fr { color: var(--text); line-height: 1.5; font-size: 14px; }
    .detail-val-ar { color: #fff; font-family: 'Cairo', sans-serif; line-height: 1.6; font-size: 14px; text-align: right; direction: rtl; }
    
    .term-gallery { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .term-img { width: 70px; height: 70px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; transition: transform 0.2s; }
    .term-img:hover { transform: scale(1.05); border-color: var(--accent); }

    /* LIGHTBOX */
    .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; }
    .lightbox.open { display: flex; }
    .lightbox img { max-width: 100%; max-height: 85vh; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.8); }

    #toast { position: fixed; bottom: 16px; right: 16px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 8px; font-size: 12px; display: none; z-index: 9999; }
    #toast.show { display: flex; }

    @media (max-width: 768px) {
      .menu-toggle { display: inline-flex; }
      .sidebar { position: fixed; top: 60px; bottom: 0; left: 0; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay.open { display: block; }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <button class="menu-toggle" onclick="toggleSidebar()">☰ أقسام</button>
    <div class="brand-logo">AA</div>
    <div class="brand-text"><h1>Assistant Escale</h1></div>
  </div>
  <div class="header-status">
    <div class="status-dot connecting" id="statusDot"></div>
    <span id="statusText">Connexion...</span>
  </div>
</header>

<div class="layout">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section">Sections / الأقسام</div>
  </nav>

  <main class="main">
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Rechercher / بحث...">
      </div>
      <button class="btn btn-ghost btn-accent2" onclick="openCatModal()">📁 الأقسام</button>
      <button class="btn btn-primary" onclick="openTermModal('add')">＋ إضافة</button>
    </div>

    <div class="content">
      <div class="table-header">
        <div class="table-title" id="sectionTitle">Chargement...</div>
        <div class="table-meta" id="tableCount">0 terme(s)</div>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th style="width:30%">Code / الرمز</th>
              <th style="width:55%">Description / العنوان (انقر للعرض)</th>
              <th style="width:15%; text-align:right;">Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr>
              <td colspan="3" style="text-align:center; padding:40px;">
                <p style="color:var(--text3)">Connexion au serveur...</p>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<div class="overlay" id="detailsOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2 style="display:inline-flex; align-items:center; gap:8px;">
        📄 <span id="detailCodeBadge" class="code-badge" style="font-size:14px;"></span>
      </h2>
      <button class="close-btn" onclick="closeModal('detailsOverlay')">✕</button>
    </div>
    
    <div class="detail-section">
      <div class="detail-label" style="color:var(--accent);">Français</div>
      <div id="detailDescFr" class="detail-val-fr"></div>
    </div>

    <div class="detail-section" id="detailArSection">
      <div class="detail-label" style="color:var(--accent2); text-align:right;">اللغة العربية</div>
      <div id="detailDescAr" class="detail-val-ar"></div>
    </div>

    <div class="detail-section" id="detailGallerySection">
      <div class="detail-label">Images / لقطات الشاشة والصور</div>
      <div id="detailGallery" class="term-gallery"></div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-primary" onclick="closeModal('detailsOverlay')">Fermer / إغلاق</button>
    </div>
  </div>
</div>

<div class="overlay" id="termOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="termModalTitle">Ajouter un terme / إضافة مصطلح</h2>
      <button class="close-btn" onclick="closeOverlayAndReset()">✕</button>
    </div>
    <input type="hidden" id="editDocId">
    
    <div class="form-group">
      <label>Section / القسم</label>
      <select class="form-control" id="formCategory"></select>
    </div>
    
    <div class="form-group">
      <label>Code / Commande (الأمر أو الرمز)</label>
      <input type="text" class="form-control" id="formCode" placeholder="Ex: WCHR">
    </div>
    
    <div style="border-left: 2px solid var(--accent); padding-left: 8px; margin-bottom: 10px;">
      <div class="form-group">
        <label style="color:var(--accent)">Description (Français)</label>
        <textarea class="form-control" id="formDesc" placeholder="Explication en français..."></textarea>
      </div>
    </div>

    <div style="border-right: 2px solid var(--accent2); padding-right: 8px; margin-bottom: 10px; text-align: right;">
      <div class="form-group">
        <label style="color:var(--accent2)">الشرح والاستخدام (باللغة العربية)</label>
        <textarea class="form-control" id="formDescAr" placeholder="اكتب الشرح هنا باللغة العربية..." style="direction: rtl; font-family:'Cairo';"></textarea>
      </div>
    </div>

    <div class="form-group">
      <label>Liens des Images (روابط الصور مفصولة بفاصلة ,)</label>
      <input type="text" class="form-control" id="formImages" placeholder="https://site.com/img1.jpg, https://site.com/img2.jpg">
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeOverlayAndReset()">Annuler / إلغاء</button>
      <button class="btn btn-primary" onclick="saveItem()" id="saveBtn">Enregistrer / حفظ</button>
    </div>
  </div>
</div>

<div class="overlay" id="catOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2>📁 Gestion des Sections / إدارة الأقسام</h2>
      <button class="close-btn" onclick="closeModal('catOverlay')">✕</button>
    </div>
    <div style="background: var(--surface2); padding: 12px; border-radius: 8px; margin-bottom: 14px; border: 1px solid var(--border);">
      <input type="hidden" id="editCatId">
      <div style="display: flex; gap: 6px; flex-wrap: wrap;">
        <input type="text" id="catIcon" class="form-control" placeholder="✈️" style="width: 45px; text-align: center;">
        <input type="text" id="catLabel" class="form-control" placeholder="Nom de section / اسم القسم" style="flex: 1;">
        <button class="btn btn-primary" onclick="saveCategory()" id="catSaveBtn">Ajouter</button>
      </div>
    </div>
    <div id="categoriesList" style="max-height: 200px; overflow-y:auto;"></div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="Grande Image">
</div>

<div id="toast">Copié !</div>

<script>
let CATEGORIES = {};
let appData = [];
let currentCat = "checkin";
let searchQuery = "";
let db, fsOps;

function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sidebarOverlay").classList.toggle("open");
}

async function initFirebase() {
  updateStatus("connecting");
  if (!window.__firebaseReady) {
    await new Promise(r => window.addEventListener("firebaseReady", r, { once: true }));
  }
  db = window.__firebaseDB;
  fsOps = window.__firebaseOps;

  try {
    fsOps.onSnapshot(fsOps.collection(db, "categories"), (snapshot) => {
      CATEGORIES = {};
      snapshot.docs.forEach(doc => { CATEGORIES[doc.id] = doc.data(); });
      
      // تعيين أول قسم متاح تلقائياً كقسم افتراضي إذا كان فارغاً
      const keys = Object.keys(CATEGORIES);
      if (keys.length > 0 && !CATEGORIES[currentCat]) {
        currentCat = keys[0];
      }
      
      renderSidebar();
      renderTable();
    });

    fsOps.onSnapshot(fsOps.collection(db, "terms"), (snapshot) => {
      appData = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      updateStatus("online");
      renderSidebar();
      renderTable();
    });
  } catch (err) {
    updateStatus("offline");
  }
}

function renderSidebar() {
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = '<div class="sidebar-section">Sections / الأقسام</div>';
  
  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    const count = appData.filter(d => d.cat === key).length;
    const btn = document.createElement("div");
    btn.className = `nav-item ${key === currentCat && !searchQuery ? "active" : ""}`;
    btn.innerHTML = `<span class="nav-icon">${cat.icon || '📁'}</span><span>${cat.label}</span><span class="nav-count">${count}</span>`;
    
    btn.onclick = () => {
      currentCat = key;
      searchQuery = ""; 
      document.getElementById("searchInput").value = "";
      if(window.innerWidth <= 768) toggleSidebar();
      renderSidebar();
      renderTable();
    };
    sidebar.appendChild(btn);
  });
}

function renderTable() {
  const tbody = document.getElementById("tableBody");
  let items = searchQuery ? 
    appData.filter(d => (d.code || "").toLowerCase().includes(searchQuery.toLowerCase()) || (d.desc || "").toLowerCase().includes(searchQuery.toLowerCase()) || (d.descAr || "").includes(searchQuery)) :
    appData.filter(d => d.cat === currentCat);

  document.getElementById("sectionTitle").textContent = searchQuery ? `Résultats` : (CATEGORIES[currentCat]?.label || "Sections");
  document.getElementById("tableCount").textContent = `${items.length} terme(s)`;

  if (items.length === 0) {
    tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; padding:30px; color:var(--text3);">Aucun élément trouvé.</td></tr>`;
    return;
  }

  tbody.innerHTML = items.map(item => {
    const safeDesc = item.desc || "";
    const safeDescAr = item.descAr || "";
    return `
    <tr onclick="viewDetails('${item.id}')">
      <td><span class="code-badge" onclick="event.stopPropagation(); copyToClipboard('${item.code}')">📋 ${item.code}</span></td>
      <td>
        <span class="clickable-title">${safeDesc.substring(0, 60)}${safeDesc.length > 60 ? '...' : ''}</span>
        ${safeDescAr ? `<div class="clickable-title-ar">🔹 ${safeDescAr.substring(0, 50)}${safeDescAr.length > 50 ? '...' : ''}</div>` : ''}
      </td>
      <td>
        <div class="actions-cell" onclick="event.stopPropagation();">
          <button class="btn btn-sm btn-warn" onclick="openTermModal('edit','${item.id}')">✏️</button>
          <button class="btn btn-sm btn-del" onclick="deleteItem('${item.id}')">🗑️</button>
        </div>
      </td>
    </tr>`;
  }).join("");
}

function viewDetails(id) {
  const item = appData.find(d => d.id === id);
  if (!item) return;

  document.getElementById("detailCodeBadge").textContent = `Code: ${item.code}`;
  document.getElementById("detailDescFr").textContent = item.desc || "Pas de description en français.";
  
  if (item.descAr) {
    document.getElementById("detailArSection").style.display = "block";
    document.getElementById("detailDescAr").textContent = item.descAr;
  } else {
    document.getElementById("detailArSection").style.display = "none";
  }

  const galleryContainer = document.getElementById("detailGallery");
  galleryContainer.innerHTML = '';
  if (item.images && item.images.trim().length > 0) {
    const imgArray = item.images.split(',').map(src => src.trim()).filter(src => src.length > 0);
    if (imgArray.length > 0) {
      document.getElementById("detailGallerySection").style.display = "block";
      imgArray.forEach(src => {
        const img = document.createElement("img");
        img.src = src;
        img.className = "term-img";
        img.onclick = () => openLightbox(src);
        img.onerror = () => img.style.display = "none";
        galleryContainer.appendChild(img);
      });
    } else {
      document.getElementById("detailGallerySection").style.display = "none";
    }
  } else {
    document.getElementById("detailGallerySection").style.display = "none";
  }

  document.getElementById("detailsOverlay").classList.add("open");
}

function openCatModal() { document.getElementById("catOverlay").classList.add("open"); renderCatList(); }
function renderCatList() {
  document.getElementById("categoriesList").innerHTML = Object.entries(CATEGORIES).map(([id, cat]) => `
    <div class="cat-list-item">
      <span>${cat.icon || '📁'} ${cat.label}</span>
      <button class="btn btn-sm btn-del" onclick="deleteCategory('${id}')">🗑️</button>
    </div>
  `).join("");
}

async function saveCategory() {
  const icon = document.getElementById("catIcon").value.trim() || "📁";
  const label = document.getElementById("catLabel").value.trim();
  if (!label) return alert("Nom requis");
  await fsOps.setDoc(fsOps.doc(db, "categories", 'cat_' + Date.now()), { icon, label });
  document.getElementById("catIcon").value = ""; document.getElementById("catLabel").value = "";
}

async function deleteCategory(id) { if (confirm("Supprimer la section ?")) await fsOps.deleteDoc(fsOps.doc(db, "categories", id)); }

function openTermModal(mode, docId = null) {
  document.getElementById("termOverlay").classList.add("open");
  document.getElementById("formCategory").innerHTML = Object.entries(CATEGORIES).map(([k, v]) => `<option value="${k}">${v.icon || '📁'} ${v.label}</option>`).join("");
  if (mode === "add") {
    document.getElementById("editDocId").value = ""; document.getElementById("formCode").value = ""; 
    document.getElementById("formDesc").value = ""; document.getElementById("formDescAr").value = "";
    document.getElementById("formImages").value = "";
  } else {
    const item = appData.find(d => d.id === docId);
    document.getElementById("editDocId").value = item.id; 
    document.getElementById("formCategory").value = item.cat; 
    document.getElementById("formCode").value = item.code; 
    document.getElementById("formDesc").value = item.desc || ""; 
    document.getElementById("formDescAr").value = item.descAr || "";
    document.getElementById("formImages").value = item.images || "";
  }
}

function closeModal(id) { document.getElementById(id).classList.remove("open"); }
function closeOverlayAndReset() { closeModal('termOverlay'); }

async function saveItem() {
  const docId = document.getElementById("editDocId").value;
  const data = { 
    cat: document.getElementById("formCategory").value, 
    code: document.getElementById("formCode").value.trim(), 
    desc: document.getElementById("formDesc").value.trim(),
    descAr: document.getElementById("formDescAr").value.trim(),
    images: document.getElementById("formImages").value.trim()
  };
  if (!data.code) return alert("Le code est requis");
  if (!docId) await fsOps.addDoc(fsOps.collection(db, "terms"), data);
  else await fsOps.updateDoc(fsOps.doc(db, "terms", docId), data);
  closeModal('termOverlay');
}

async function deleteItem(docId) { if (confirm("Supprimer ?")) await fsOps.deleteDoc(fsOps.doc(db, "terms", docId)); }
function copyToClipboard(text) { navigator.clipboard.writeText(text).then(() => { const t = document.getElementById("toast"); t.textContent=`Copié: ${text}`; t.className = "show"; setTimeout(() => t.className = "", 1500); }); }

function openLightbox(src) {
  document.getElementById("lightboxImg").src = src;
  document.getElementById("lightbox").classList.add("open");
}
function closeLightbox() { document.getElementById("lightbox").classList.remove("open"); }

function updateStatus(state) { 
  document.getElementById("statusDot").className = "status-dot " + state; 
  document.getElementById("statusText").textContent = state === "online" ? "Connecté" : "Connexion..."; 
}
document.getElementById("searchInput").addEventListener("input", function() { searchQuery = this.value.trim(); renderTable(); });

initFirebase();
</script>
